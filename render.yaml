services:
  - type: web
    name: willy-backend
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: backend-plxk.onrender.com,.onrender.com
      - key: CORS_ALLOW_ALL_ORIGINS
        value: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://efgh-3h6w.vercel.app
      - key: CSRF_TRUSTED_ORIGINS
        value: https://efgh-3h6w.vercel.app,https://*.vercel.app
      - key: FRONTEND_URL
        value: https://efgh-3h6w.vercel.app
      - key: DB_SSLMODE
        value: require
      - key: RUN_MIGRATIONS
        value: "1"
      - key: COLLECT_STATIC
        value: "1"
      - key: SESSION_COOKIE_SAMESITE
        value: None
      - key: CSRF_COOKIE_SAMESITE
        value: None
      - key: AUTH_COOKIE_SAMESITE
        value: None
